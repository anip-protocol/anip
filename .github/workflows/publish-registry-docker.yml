name: Publish Registry Docker Image

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Registry image version tag (e.g., 0.5.1)"
        required: true
        default: "0.5.1"
      source_ref:
        description: "Git ref to build from"
        required: true
        default: "main"
      tag_latest:
        description: "Also update the latest tag"
        type: boolean
        default: true

jobs:
  publish-registry-docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.source_ref }}

      - name: Validate version
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Invalid version format: $VERSION"
            exit 1
          fi

      - name: Set Registry build version
        env:
          VERSION: ${{ inputs.version }}
        run: |
          node -e "
            const fs = require('fs');
            for (const file of ['registry/package.json', 'registry/package-lock.json']) {
              const p = JSON.parse(fs.readFileSync(file, 'utf8'));
              p.version = process.env.VERSION;
              if (p.packages && p.packages['']) p.packages[''].version = process.env.VERSION;
              fs.writeFileSync(file, JSON.stringify(p, null, 2) + '\n');
            }
            const versionFile = 'registry/src/version.ts';
            const source = fs.readFileSync(versionFile, 'utf8');
            fs.writeFileSync(
              versionFile,
              source.replace(/export const REGISTRY_VERSION = '[^']+'/u, \"export const REGISTRY_VERSION = '\" + process.env.VERSION + \"'\")
            );
          "

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Registry image
        env:
          VERSION: ${{ inputs.version }}
          TAG_LATEST: ${{ inputs.tag_latest }}
        run: |
          TAG_ARGS="-t anipprotocol/registry:$VERSION"
          if [ "$TAG_LATEST" = "true" ]; then
            TAG_ARGS="$TAG_ARGS -t anipprotocol/registry:latest"
          fi
          docker build $TAG_ARGS -f registry/Dockerfile .
          docker push anipprotocol/registry:"$VERSION"
          if [ "$TAG_LATEST" = "true" ]; then
            docker push anipprotocol/registry:latest
          fi
