name: Publish GTM Agent Windows Desktop

on:
  workflow_dispatch:
    inputs:
      version:
        description: "GTM Agent desktop app version tag (e.g., 0.1.0)"
        required: true
      source_ref:
        description: "Git ref to build from"
        required: true
        default: "main"
      release_tag:
        description: "Optional GitHub Release tag to attach Windows artifacts to"
        required: false
        default: ""

jobs:
  publish-gtm-agent-desktop-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    env:
      VERSION: ${{ inputs.version }}
      APP_DIR: examples/showcase/gtm/desktop
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.source_ref }}

      - name: Validate inputs
        shell: bash
        run: |
          set -euo pipefail
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Invalid version format: $VERSION"
            exit 1
          fi

      - name: Set up Node 22
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ${{ env.APP_DIR }}/package-lock.json

      - name: Install GTM Agent desktop dependencies
        shell: bash
        run: npm --prefix "$APP_DIR" ci

      - name: Select Rust stable toolchain
        shell: bash
        run: |
          set -euo pipefail
          rustup default stable
          rustup show active-toolchain
          cargo --version

      - name: Set GTM Agent desktop release metadata
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          import pathlib
          import re

          version = os.environ["VERSION"]
          app_dir = pathlib.Path(os.environ["APP_DIR"])

          for path in [app_dir / "package.json", app_dir / "package-lock.json"]:
              data = json.loads(path.read_text())
              data["version"] = version
              if isinstance(data.get("packages"), dict) and isinstance(data["packages"].get(""), dict):
                  data["packages"][""]["version"] = version
              path.write_text(json.dumps(data, indent=2) + "\n")

          tauri_config_path = app_dir / "src-tauri/tauri.conf.json"
          tauri_config = json.loads(tauri_config_path.read_text())
          tauri_config["version"] = version
          bundle = tauri_config.setdefault("bundle", {})
          bundle["targets"] = ["nsis"]
          tauri_config_path.write_text(json.dumps(tauri_config, indent=2) + "\n")

          cargo_toml_path = app_dir / "src-tauri/Cargo.toml"
          cargo_toml = cargo_toml_path.read_text()
          cargo_toml = re.sub(r'(?m)^version = "[^"]+"', f'version = "{version}"', cargo_toml, count=1)
          cargo_toml_path.write_text(cargo_toml)

          cargo_lock_path = app_dir / "src-tauri/Cargo.lock"
          cargo_lock = cargo_lock_path.read_text()
          cargo_lock = re.sub(
              r'(name = "gtm-agent-desktop"\nversion = ")[^"]+(")',
              rf'\g<1>{version}\2',
              cargo_lock,
              count=1,
          )
          cargo_lock_path.write_text(cargo_lock)
          PY

      - name: Build GTM Agent desktop app
        shell: bash
        working-directory: examples/showcase/gtm/desktop
        run: npm exec -- tauri build

      - name: Locate Windows artifacts
        id: artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/gtm-agent-windows-artifacts"
          find "$APP_DIR/src-tauri/target/release/bundle" -maxdepth 3 -type f \
            \( -name "*.exe" -o -name "*.msi" \) \
            -print \
            -exec cp {} "$RUNNER_TEMP/gtm-agent-windows-artifacts/" \;
          ARTIFACT_COUNT="$(find "$RUNNER_TEMP/gtm-agent-windows-artifacts" -type f | wc -l | tr -d ' ')"
          if [ "$ARTIFACT_COUNT" = "0" ]; then
            echo "::error::No Windows installer artifacts were produced"
            find "$APP_DIR/src-tauri/target/release/bundle" -maxdepth 4 -type f -print || true
            exit 1
          fi
          echo "artifact_dir=$RUNNER_TEMP/gtm-agent-windows-artifacts" >> "$GITHUB_OUTPUT"
          find "$RUNNER_TEMP/gtm-agent-windows-artifacts" -type f -print

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gtm-agent-desktop-windows-${{ inputs.version }}
          path: ${{ steps.artifacts.outputs.artifact_dir }}
          if-no-files-found: error

      - name: Attach Windows artifacts to GitHub Release
        if: inputs.release_tag != ''
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
          SOURCE_REF: ${{ inputs.source_ref }}
          ARTIFACT_DIR: ${{ steps.artifacts.outputs.artifact_dir }}
        shell: bash
        run: |
          set -euo pipefail
          if ! gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release create "$RELEASE_TAG" \
              --target "$SOURCE_REF" \
              --title "GTM Agent Desktop ${VERSION}" \
              --notes "GTM Agent Desktop ${VERSION} preview artifacts."
          fi
          while IFS= read -r artifact; do
            gh release upload "$RELEASE_TAG" "$artifact" --clobber
          done < <(find "$ARTIFACT_DIR" -type f -print)
