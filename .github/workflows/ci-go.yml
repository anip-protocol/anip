name: CI — Go

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      should_test: ${{ steps.filter.outputs.src }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            src:
              - "packages/go/**"
              - ".github/workflows/ci-go.yml"

  test:
    needs: changes
    if: needs.changes.outputs.should_test == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ["1.22", "1.23"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Build
        working-directory: packages/go
        run: go build ./...

      - name: Test
        working-directory: packages/go
        run: go test ./... -v

  conformance:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build Go example
        working-directory: packages/go/examples/flights
        run: go build -o flight-service .

      - name: Start Go example
        working-directory: packages/go/examples/flights
        run: |
          ./flight-service &
          sleep 3

      - name: Install and run conformance suite
        run: |
          pip install -e "./conformance"
          pytest conformance/ \
            --base-url=http://localhost:8080 \
            --bootstrap-bearer=demo-human-key \
            --sample-inputs=conformance/samples/flight-service.json \
            -v

  go-ci:
    if: always()
    needs: [changes, test, conformance]
    runs-on: ubuntu-latest
    steps:
      - name: Passed
        if: |
          (needs.test.result == 'success' || needs.test.result == 'skipped') &&
          (needs.conformance.result == 'success' || needs.conformance.result == 'skipped')
        run: echo "Go CI passed"
      - name: Failed
        if: |
          needs.test.result == 'failure' || needs.test.result == 'cancelled' ||
          needs.conformance.result == 'failure' || needs.conformance.result == 'cancelled'
        run: exit 1
