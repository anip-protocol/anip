name: Publish Studio Docker Images

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Studio image version tag (e.g., 0.24.6)"
        required: true
      source_ref:
        description: "Git ref to build from"
        required: true
        default: "main"
      tag_latest:
        description: "Also update the latest tags"
        type: boolean
        default: true

jobs:
  publish-studio-docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.source_ref }}

      - name: Validate version
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Invalid version format: $VERSION"
            exit 1
          fi

      - name: Set Studio build version
        env:
          VERSION: ${{ inputs.version }}
        run: |
          node -e "
            const fs = require('fs');
            for (const file of ['studio/package.json', 'studio/package-lock.json']) {
              const p = JSON.parse(fs.readFileSync(file, 'utf8'));
              p.version = process.env.VERSION;
              if (p.packages && p.packages['']) p.packages[''].version = process.env.VERSION;
              fs.writeFileSync(file, JSON.stringify(p, null, 2) + '\n');
            }
            const versionFile = 'studio/src/version.ts';
            const source = fs.readFileSync(versionFile, 'utf8');
            fs.writeFileSync(
              versionFile,
              source.replace(/export const STUDIO_VERSION = '[^']+'/u, \"export const STUDIO_VERSION = '\" + process.env.VERSION + \"'\")
            );
          "

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Studio API image
        env:
          VERSION: ${{ inputs.version }}
          TAG_LATEST: ${{ inputs.tag_latest }}
        run: |
          TAG_ARGS="-t anipprotocol/studio-api:$VERSION"
          if [ "$TAG_LATEST" = "true" ]; then
            TAG_ARGS="$TAG_ARGS -t anipprotocol/studio-api:latest"
          fi
          docker build $TAG_ARGS -f studio/server/Dockerfile .
          docker push anipprotocol/studio-api:"$VERSION"
          if [ "$TAG_LATEST" = "true" ]; then
            docker push anipprotocol/studio-api:latest
          fi

      - name: Build and push Studio web images
        env:
          VERSION: ${{ inputs.version }}
          TAG_LATEST: ${{ inputs.tag_latest }}
        run: |
          TAG_ARGS="-t anipprotocol/studio-web:$VERSION -t anipprotocol/studio:$VERSION"
          if [ "$TAG_LATEST" = "true" ]; then
            TAG_ARGS="$TAG_ARGS -t anipprotocol/studio-web:latest -t anipprotocol/studio:latest"
          fi
          docker build $TAG_ARGS -f studio/Dockerfile.standalone .
          docker push anipprotocol/studio-web:"$VERSION"
          docker push anipprotocol/studio:"$VERSION"
          if [ "$TAG_LATEST" = "true" ]; then
            docker push anipprotocol/studio-web:latest
            docker push anipprotocol/studio:latest
          fi
