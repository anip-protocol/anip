name: Publish GTM Showcase Images

on:
  workflow_dispatch:
    inputs:
      version:
        description: "GTM image tag, usually the GTM package version (e.g. 0.4.4)"
        required: true
        default: "0.4.3"
      push_latest:
        description: "Also tag and push latest"
        type: boolean
        default: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push GTM showcase images
        env:
          ANIP_GTM_IMAGE_TAG: ${{ inputs.version }}
          ANIP_GTM_PUSH: "1"
          ANIP_GTM_TAG_LATEST: ${{ inputs.push_latest && '1' || '0' }}
        run: examples/showcase/gtm/scripts/build-language-parity-images.sh
