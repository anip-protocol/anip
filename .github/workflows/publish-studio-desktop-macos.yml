name: Publish Studio macOS Desktop

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Studio desktop app version tag (e.g., 0.9.0)"
        required: true
      source_ref:
        description: "Git ref to build from"
        required: true
        default: "main"
      release_tag:
        description: "Optional GitHub Release tag to attach the DMG to"
        required: false
        default: ""

jobs:
  publish-studio-desktop-macos:
    runs-on: macos-latest
    permissions:
      contents: write
    env:
      VERSION: ${{ inputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.source_ref }}

      - name: Validate inputs and secrets
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Invalid version format: $VERSION"
            exit 1
          fi
          for name in \
            APPLE_CERTIFICATE \
            APPLE_CERTIFICATE_PASSWORD \
            APPLE_SIGNING_IDENTITY \
            APPLE_TEAM_ID \
            APPLE_API_ISSUER \
            APPLE_API_KEY \
            APPLE_API_KEY_P8 \
            KEYCHAIN_PASSWORD
          do
            if [ -z "${!name:-}" ]; then
              echo "::error::$name is required for signed/notarized macOS desktop publishing"
              exit 1
            fi
          done
          if ! printf '%s' "$APPLE_SIGNING_IDENTITY" | grep -q "($APPLE_TEAM_ID)"; then
            echo "::error::APPLE_SIGNING_IDENTITY must include APPLE_TEAM_ID in parentheses"
            exit 1
          fi

      - name: Import Developer ID certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          CERTIFICATE_PATH="$RUNNER_TEMP/apple-developer-id-application.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/anip-studio-signing.keychain-db"

          echo "$APPLE_CERTIFICATE" | base64 --decode > "$CERTIFICATE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Write App Store Connect API key
        id: notary-key
        env:
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
        run: |
          set -euo pipefail
          API_KEY_PATH="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY}.p8"
          printf '%s' "$APPLE_API_KEY_P8" > "$API_KEY_PATH"
          chmod 600 "$API_KEY_PATH"
          echo "path=$API_KEY_PATH" >> "$GITHUB_OUTPUT"

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install desktop API build dependencies
        run: |
          set -euo pipefail
          python -m venv .venv
          . .venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install -r studio/server/desktop-build-requirements.txt

      - name: Set up Node 22
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: studio/package-lock.json

      - name: Install Studio dependencies
        run: |
          set -euo pipefail
          npm --prefix studio ci
          npm --prefix packages/typescript/vue install --include=dev --no-package-lock

      - name: Select Rust stable toolchain
        run: |
          set -euo pipefail
          rustup default stable
          rustup show active-toolchain
          cargo --version

      - name: Set Studio desktop release metadata
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          import pathlib
          import re

          version = os.environ["VERSION"]
          signing_identity = os.environ["APPLE_SIGNING_IDENTITY"]
          root = pathlib.Path(".")

          for path in [root / "studio/package.json", root / "studio/package-lock.json"]:
              data = json.loads(path.read_text())
              data["version"] = version
              if isinstance(data.get("packages"), dict) and isinstance(data["packages"].get(""), dict):
                  data["packages"][""]["version"] = version
              path.write_text(json.dumps(data, indent=2) + "\n")

          version_file = root / "studio/src/version.ts"
          source = version_file.read_text()
          source = re.sub(
              r"export const STUDIO_VERSION = '[^']+'",
              f"export const STUDIO_VERSION = '{version}'",
              source,
          )
          version_file.write_text(source)

          tauri_config_path = root / "studio/src-tauri/tauri.conf.json"
          tauri_config = json.loads(tauri_config_path.read_text())
          tauri_config["version"] = version
          bundle = tauri_config.setdefault("bundle", {})
          macos = bundle.setdefault("macOS", {})
          macos["signingIdentity"] = signing_identity
          macos["hardenedRuntime"] = True
          tauri_config_path.write_text(json.dumps(tauri_config, indent=2) + "\n")

          cargo_toml_path = root / "studio/src-tauri/Cargo.toml"
          cargo_toml = cargo_toml_path.read_text()
          cargo_toml = re.sub(r'(?m)^version = "[^"]+"', f'version = "{version}"', cargo_toml, count=1)
          cargo_toml_path.write_text(cargo_toml)

          cargo_lock_path = root / "studio/src-tauri/Cargo.lock"
          cargo_lock = cargo_lock_path.read_text()
          cargo_lock = re.sub(
              r'(name = "anip-studio-desktop"\nversion = ")[^"]+(")',
              rf'\g<1>{version}\2',
              cargo_lock,
              count=1,
          )
          cargo_lock_path.write_text(cargo_lock)
          PY

      - name: Build Studio desktop app
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: npm --prefix studio run desktop:build

      - name: Locate desktop artifacts
        id: artifacts
        run: |
          set -euo pipefail
          APP_PATH="studio/src-tauri/target/release/bundle/macos/ANIP Studio.app"
          DMG_PATH="$(find studio/src-tauri/target/release/bundle/dmg -maxdepth 1 -type f -name "ANIP Studio_${VERSION}_*.dmg" | head -n 1)"
          if [ ! -d "$APP_PATH" ]; then
            echo "::error::Missing app bundle at $APP_PATH"
            exit 1
          fi
          if [ -z "$DMG_PATH" ] || [ ! -f "$DMG_PATH" ]; then
            echo "::error::Missing DMG for version $VERSION"
            find studio/src-tauri/target/release/bundle/dmg -maxdepth 1 -type f -print || true
            exit 1
          fi
          echo "app_path=$APP_PATH" >> "$GITHUB_OUTPUT"
          echo "dmg_path=$DMG_PATH" >> "$GITHUB_OUTPUT"
          echo "Located app: $APP_PATH"
          echo "Located DMG: $DMG_PATH"

      - name: Verify code signature before notarization
        run: |
          set -euo pipefail
          codesign --verify --deep --strict --verbose=2 "${{ steps.artifacts.outputs.app_path }}"
          codesign --display --verbose=4 "${{ steps.artifacts.outputs.app_path }}"

      - name: Notarize and staple DMG
        env:
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_PATH: ${{ steps.notary-key.outputs.path }}
        run: |
          set -euo pipefail
          SUBMIT_JSON="$RUNNER_TEMP/notary-submit.json"
          xcrun notarytool submit "${{ steps.artifacts.outputs.dmg_path }}" \
            --key "$APPLE_API_KEY_PATH" \
            --key-id "$APPLE_API_KEY" \
            --issuer "$APPLE_API_ISSUER" \
            --wait \
            --output-format json > "$SUBMIT_JSON"

          cat "$SUBMIT_JSON"
          SUBMISSION_ID="$(python -c 'import json,sys; print(json.load(open(sys.argv[1])).get("id", ""))' "$SUBMIT_JSON")"
          SUBMISSION_STATUS="$(python -c 'import json,sys; print(json.load(open(sys.argv[1])).get("status", ""))' "$SUBMIT_JSON")"
          if [ -z "$SUBMISSION_ID" ]; then
            echo "::error::notarytool did not return a submission id"
            exit 1
          fi
          if [ "$SUBMISSION_STATUS" != "Accepted" ]; then
            echo "::error::Apple notarization status is $SUBMISSION_STATUS for submission $SUBMISSION_ID"
            xcrun notarytool log "$SUBMISSION_ID" \
              --key "$APPLE_API_KEY_PATH" \
              --key-id "$APPLE_API_KEY" \
              --issuer "$APPLE_API_ISSUER" || true
            exit 1
          fi

          xcrun stapler staple "${{ steps.artifacts.outputs.dmg_path }}"
          xcrun stapler validate "${{ steps.artifacts.outputs.dmg_path }}"

      - name: Verify notarized DMG with Gatekeeper
        run: |
          set -euo pipefail
          spctl -a -vvv -t install "${{ steps.artifacts.outputs.dmg_path }}"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: anip-studio-macos-${{ inputs.version }}
          path: ${{ steps.artifacts.outputs.dmg_path }}
          if-no-files-found: error

      - name: Attach DMG to GitHub Release
        if: inputs.release_tag != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release upload "${{ inputs.release_tag }}" "${{ steps.artifacts.outputs.dmg_path }}" --clobber

      - name: Delete temporary keychain
        if: always()
        env:
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN_PATH="$RUNNER_TEMP/anip-studio-signing.keychain-db"
          if [ -f "$KEYCHAIN_PATH" ]; then
            security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH" || true
            security delete-keychain "$KEYCHAIN_PATH" || true
          fi
