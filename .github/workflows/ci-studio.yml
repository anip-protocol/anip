name: CI — Studio

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      should_test: ${{ steps.filter.outputs.src }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            src:
              - "studio/**"
              - "packages/python/anip-studio/**"
              - "packages/typescript/client/**"
              - "packages/typescript/vue/**"
              - ".github/workflows/ci-studio.yml"

  build:
    needs: changes
    if: needs.changes.outputs.should_test == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Studio API dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r studio/server/requirements.txt

      - name: Test SQLite desktop backend
        run: PYTHONPATH=. pytest studio/server_sqlite_tests/test_sqlite_backend.py -q

      - name: Set up Node 22
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: studio
        run: npm ci

      - name: Test
        working-directory: studio
        run: npx vitest run

      - name: Type check
        working-directory: studio
        run: npx vue-tsc --noEmit

      - name: Build and verify synced assets
        run: |
          bash studio/sync.sh
          if [ -n "$(git status --porcelain packages/python/anip-studio/src/anip_studio/static/)" ]; then
            echo "ERROR: Studio assets are stale. Run 'cd studio && bash sync.sh' and commit the result."
            git diff --stat packages/python/anip-studio/src/anip_studio/static/
            exit 1
          fi
          echo "Studio assets are in sync."

      - name: Docker build smoke test
        run: |
          docker build -t anip-studio-api-test -f studio/server/Dockerfile .
          docker build -t anip-studio-web-test -f studio/Dockerfile.standalone .

      - name: Compose smoke test
        run: studio/scripts/smoke-compose.sh

  studio-ci:
    if: always()
    needs: [changes, build]
    runs-on: ubuntu-latest
    steps:
      - name: Passed
        if: needs.build.result == 'success' || needs.build.result == 'skipped'
        run: echo "Studio CI passed"
      - name: Failed
        if: needs.build.result == 'failure' || needs.build.result == 'cancelled'
        run: exit 1
