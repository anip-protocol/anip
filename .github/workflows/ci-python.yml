name: CI — Python

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      should_test: ${{ steps.filter.outputs.src }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            src:
              - "packages/python/**"
              - "examples/anip/**"
              - "contract-tests/**"
              - ".github/workflows/ci-python.yml"

  test:
    needs: changes
    if: needs.changes.outputs.should_test == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install packages in dependency order
        run: |
          pip install -e "./packages/python/anip-core[dev]"
          pip install -e "./packages/python/anip-crypto[dev]"
          pip install -e "./packages/python/anip-server[dev]"
          pip install -e "./packages/python/anip-service[dev]"
          pip install -e "./packages/python/anip-fastapi[dev]"
          pip install -e "./packages/python/anip-mcp[dev]"
          pip install -e "./packages/python/anip-rest[dev]"
          pip install -e "./packages/python/anip-graphql[dev]"
          pip install -e "./packages/python/anip-stdio"
          pip install -e "./packages/python/anip-grpc"
          pip install pytest-asyncio

      - name: Compile check
        run: python -m compileall packages/python/ examples/anip/

      - name: Test anip-core
        run: pytest packages/python/anip-core/tests/ -v

      - name: Test anip-crypto
        run: pytest packages/python/anip-crypto/tests/ -v

      - name: Test anip-server
        run: pytest packages/python/anip-server/tests/ -v

      - name: Test anip-service
        run: pytest packages/python/anip-service/tests/ -v

      - name: Test anip-fastapi
        run: pytest packages/python/anip-fastapi/tests/ -v

      - name: Test anip-mcp
        run: pytest packages/python/anip-mcp/tests/ -v

      - name: Test anip-rest
        run: pytest packages/python/anip-rest/tests/ -v

      - name: Test anip-graphql
        run: pytest packages/python/anip-graphql/tests/ -v

      - name: Test anip-stdio
        run: pytest packages/python/anip-stdio/tests/ -v

      - name: Test anip-grpc
        run: pytest packages/python/anip-grpc/tests/ -v

      - name: Install contract-tests
        run: pip install -e "./contract-tests"

      - name: Test contract-tests
        run: pytest contract-tests/tests/ -v

      - name: Install Python example
        working-directory: examples/anip
        run: pip install -e ".[dev]"

      - name: Test Python example
        run: pytest examples/anip/tests/ -v

  contract-test:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ANIP packages
        run: |
          pip install -e "./packages/python/anip-core"
          pip install -e "./packages/python/anip-crypto"
          pip install -e "./packages/python/anip-server"
          pip install -e "./packages/python/anip-service"
          pip install -e "./packages/python/anip-fastapi"
          pip install -e "./packages/python/anip-rest"
          pip install -e "./packages/python/anip-graphql"
          pip install -e "./packages/python/anip-mcp"
          pip install -e "./contract-tests"
          pip install uvicorn

      - name: Run contract tests against travel showcase
        run: |
          (cd examples/showcase/travel && python app.py) &
          sleep 5
          anip-contract-tests --base-url=http://localhost:8000 --test-pack=contract-tests/packs/travel.json
          kill %1 2>/dev/null || true
          sleep 1

      - name: Run contract tests against finance showcase
        run: |
          (cd examples/showcase/finance && python app.py) &
          sleep 5
          anip-contract-tests --base-url=http://localhost:8000 --test-pack=contract-tests/packs/finance.json
          kill %1 2>/dev/null || true
          sleep 1

      - name: Run contract tests against devops showcase
        run: |
          (cd examples/showcase/devops && python app.py) &
          sleep 5
          anip-contract-tests --base-url=http://localhost:8000 --test-pack=contract-tests/packs/devops.json
          kill %1 2>/dev/null || true

  python-ci:
    if: always()
    needs: [changes, test, contract-test]
    runs-on: ubuntu-latest
    steps:
      - name: Passed
        if: |
          (needs.test.result == 'success' || needs.test.result == 'skipped') &&
          (needs.contract-test.result == 'success' || needs.contract-test.result == 'skipped')
        run: echo "Python CI passed"
      - name: Failed
        if: |
          needs.test.result == 'failure' || needs.test.result == 'cancelled' ||
          needs.contract-test.result == 'failure' || needs.contract-test.result == 'cancelled'
        run: exit 1
