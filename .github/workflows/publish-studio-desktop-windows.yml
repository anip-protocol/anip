name: Publish Studio Windows Desktop

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Studio desktop app version tag (e.g., 0.9.0)"
        required: true
      source_ref:
        description: "Git ref to build from"
        required: true
        default: "main"
      release_tag:
        description: "Optional GitHub Release tag to attach Windows artifacts to"
        required: false
        default: ""

jobs:
  publish-studio-desktop-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    env:
      VERSION: ${{ inputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.source_ref }}

      - name: Validate inputs
        shell: bash
        run: |
          set -euo pipefail
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Invalid version format: $VERSION"
            exit 1
          fi

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install desktop API build dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m venv .venv
          . .venv/Scripts/activate
          python -m pip install --upgrade pip
          python -m pip install -r studio/server/desktop-build-requirements.txt

      - name: Set up Node 22
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: studio/package-lock.json

      - name: Install Studio dependencies
        shell: bash
        run: |
          set -euo pipefail
          npm --prefix studio ci
          npm --prefix packages/typescript/vue install --include=dev --no-package-lock

      - name: Select Rust stable toolchain
        shell: bash
        run: |
          set -euo pipefail
          rustup default stable
          rustup show active-toolchain
          cargo --version

      - name: Set Studio desktop release metadata
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          import pathlib
          import re

          version = os.environ["VERSION"]
          root = pathlib.Path(".")

          for path in [root / "studio/package.json", root / "studio/package-lock.json"]:
              data = json.loads(path.read_text())
              data["version"] = version
              if isinstance(data.get("packages"), dict) and isinstance(data["packages"].get(""), dict):
                  data["packages"][""]["version"] = version
              path.write_text(json.dumps(data, indent=2) + "\n")

          version_file = root / "studio/src/version.ts"
          source = version_file.read_text()
          source = re.sub(
              r"export const STUDIO_VERSION = '[^']+'",
              f"export const STUDIO_VERSION = '{version}'",
              source,
          )
          version_file.write_text(source)

          tauri_config_path = root / "studio/src-tauri/tauri.conf.json"
          tauri_config = json.loads(tauri_config_path.read_text())
          tauri_config["version"] = version
          bundle = tauri_config.setdefault("bundle", {})
          bundle["targets"] = ["nsis"]
          tauri_config_path.write_text(json.dumps(tauri_config, indent=2) + "\n")

          cargo_toml_path = root / "studio/src-tauri/Cargo.toml"
          cargo_toml = cargo_toml_path.read_text()
          cargo_toml = re.sub(r'(?m)^version = "[^"]+"', f'version = "{version}"', cargo_toml, count=1)
          cargo_toml_path.write_text(cargo_toml)

          cargo_lock_path = root / "studio/src-tauri/Cargo.lock"
          cargo_lock = cargo_lock_path.read_text()
          cargo_lock = re.sub(
              r'(name = "anip-studio-desktop"\nversion = ")[^"]+(")',
              rf'\g<1>{version}\2',
              cargo_lock,
              count=1,
          )
          cargo_lock_path.write_text(cargo_lock)
          PY

      - name: Build Studio desktop sidecar
        shell: bash
        run: |
          set -euo pipefail
          npm --prefix studio run build:desktop-api
          TARGET_TRIPLE="$(rustc -vV | awk '/^host:/ {print $2}')"
          SIDECAR_PATH="studio/src-tauri/bin/anip-studio-api-${TARGET_TRIPLE}"
          if [ ! -f "$SIDECAR_PATH" ]; then
            echo "::error::Missing Studio API sidecar at $SIDECAR_PATH"
            exit 1
          fi
          file "$SIDECAR_PATH"

      - name: Build Studio desktop app
        shell: bash
        run: npm --prefix studio exec -- tauri build

      - name: Locate Windows artifacts
        id: artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/anip-studio-windows-artifacts"
          find studio/src-tauri/target/release/bundle -maxdepth 3 -type f \
            \( -name "*.exe" -o -name "*.msi" \) \
            -print \
            -exec cp {} "$RUNNER_TEMP/anip-studio-windows-artifacts/" \;
          ARTIFACT_COUNT="$(find "$RUNNER_TEMP/anip-studio-windows-artifacts" -type f | wc -l | tr -d ' ')"
          if [ "$ARTIFACT_COUNT" = "0" ]; then
            echo "::error::No Windows installer artifacts were produced"
            find studio/src-tauri/target/release/bundle -maxdepth 4 -type f -print || true
            exit 1
          fi
          echo "artifact_dir=$RUNNER_TEMP/anip-studio-windows-artifacts" >> "$GITHUB_OUTPUT"
          find "$RUNNER_TEMP/anip-studio-windows-artifacts" -type f -print

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: anip-studio-windows-${{ inputs.version }}
          path: ${{ steps.artifacts.outputs.artifact_dir }}
          if-no-files-found: error

      - name: Attach Windows artifacts to GitHub Release
        if: inputs.release_tag != ''
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
          SOURCE_REF: ${{ inputs.source_ref }}
          ARTIFACT_DIR: ${{ steps.artifacts.outputs.artifact_dir }}
        shell: bash
        run: |
          set -euo pipefail
          if ! gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release create "$RELEASE_TAG" \
              --target "$SOURCE_REF" \
              --title "ANIP Studio Desktop ${VERSION}" \
              --notes "ANIP Studio Desktop ${VERSION} preview artifacts."
          fi
          while IFS= read -r artifact; do
            gh release upload "$RELEASE_TAG" "$artifact" --clobber
          done < <(find "$ARTIFACT_DIR" -type f -print)
