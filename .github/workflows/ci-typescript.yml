name: CI — TypeScript

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      should_test: ${{ steps.filter.outputs.src }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            src:
              - "packages/typescript/**"
              - "examples/anip-ts/**"
              - ".github/workflows/ci-typescript.yml"

  test:
    needs: changes
    if: needs.changes.outputs.should_test == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install workspace dependencies
        working-directory: packages/typescript
        run: npm ci

      - name: Build packages in dependency order
        working-directory: packages/typescript
        run: |
          npx tsc -p core/tsconfig.json
          npx tsc -p crypto/tsconfig.json
          npx tsc -p server/tsconfig.json
          npx tsc -p service/tsconfig.json
          npx tsc -p hono/tsconfig.json
          npx tsc -p express/tsconfig.json
          npx tsc -p fastify/tsconfig.json
          npx tsc -p mcp/tsconfig.json
          npx tsc -p rest/tsconfig.json
          npx tsc -p graphql/tsconfig.json
          npx tsc -p mcp-hono/tsconfig.json
          npx tsc -p mcp-express/tsconfig.json
          npx tsc -p mcp-fastify/tsconfig.json
          npx tsc -p stdio/tsconfig.json

      - name: Test @anip-dev/core
        working-directory: packages/typescript
        run: npm test --workspace=@anip-dev/core

      - name: Test @anip-dev/crypto
        working-directory: packages/typescript
        run: npm test --workspace=@anip-dev/crypto

      - name: Test @anip-dev/server
        working-directory: packages/typescript
        run: npm test --workspace=@anip-dev/server

      - name: Test @anip-dev/service
        working-directory: packages/typescript
        run: npm test --workspace=@anip-dev/service

      - name: Test @anip-dev/hono
        working-directory: packages/typescript
        run: npm test --workspace=@anip-dev/hono

      - name: Test @anip-dev/express
        working-directory: packages/typescript
        run: npm test --workspace=@anip-dev/express

      - name: Test @anip-dev/fastify
        working-directory: packages/typescript
        run: npm test --workspace=@anip-dev/fastify

      - name: Test @anip-dev/mcp
        working-directory: packages/typescript
        run: npm test --workspace=@anip-dev/mcp

      - name: Test @anip-dev/rest
        working-directory: packages/typescript
        run: npm test --workspace=@anip-dev/rest

      - name: Test @anip-dev/graphql
        working-directory: packages/typescript
        run: npm test --workspace=@anip-dev/graphql

      - name: Test @anip-dev/mcp-hono
        working-directory: packages/typescript
        run: npm test --workspace=@anip-dev/mcp-hono

      - name: Test @anip-dev/mcp-express
        working-directory: packages/typescript
        run: npm test --workspace=@anip-dev/mcp-express

      - name: Test @anip-dev/mcp-fastify
        working-directory: packages/typescript
        run: npm test --workspace=@anip-dev/mcp-fastify

      - name: Test @anip-dev/stdio
        working-directory: packages/typescript
        run: npm test --workspace=@anip-dev/stdio

      - name: Install and test TypeScript example
        working-directory: examples/anip-ts
        run: |
          npm ci
          npm test

  typescript-ci:
    if: always()
    needs: [changes, test]
    runs-on: ubuntu-latest
    steps:
      - name: Passed
        if: needs.test.result == 'success' || needs.test.result == 'skipped'
        run: echo "TypeScript CI passed"
      - name: Failed
        if: needs.test.result == 'failure' || needs.test.result == 'cancelled'
        run: exit 1
