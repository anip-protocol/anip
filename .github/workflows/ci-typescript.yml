name: CI — TypeScript

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      should_test: ${{ steps.filter.outputs.src }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            src:
              - "packages/typescript/**"
              - "examples/anip-ts/**"
              - ".github/workflows/ci-typescript.yml"

  test:
    needs: changes
    if: needs.changes.outputs.should_test == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install workspace dependencies
        working-directory: packages/typescript
        run: npm ci

      - name: Build packages in dependency order
        working-directory: packages/typescript
        run: |
          npx tsc -p core/tsconfig.json
          npx tsc -p crypto/tsconfig.json
          npx tsc -p server/tsconfig.json
          npx tsc -p service/tsconfig.json
          npx tsc -p hono/tsconfig.json
          npx tsc -p express/tsconfig.json
          npx tsc -p fastify/tsconfig.json

      - name: Test @anip/core
        working-directory: packages/typescript
        run: npm test --workspace=@anip/core

      - name: Test @anip/crypto
        working-directory: packages/typescript
        run: npm test --workspace=@anip/crypto

      - name: Test @anip/server
        working-directory: packages/typescript
        run: npm test --workspace=@anip/server

      - name: Test @anip/service
        working-directory: packages/typescript
        run: npm test --workspace=@anip/service

      - name: Test @anip/hono
        working-directory: packages/typescript
        run: npm test --workspace=@anip/hono

      - name: Test @anip/express
        working-directory: packages/typescript
        run: npm test --workspace=@anip/express

      - name: Test @anip/fastify
        working-directory: packages/typescript
        run: npm test --workspace=@anip/fastify

      - name: Install and test TypeScript example
        working-directory: examples/anip-ts
        run: |
          npm ci
          npm test

  typescript-ci:
    if: always()
    needs: [changes, test]
    runs-on: ubuntu-latest
    steps:
      - name: Passed
        if: needs.test.result == 'success' || needs.test.result == 'skipped'
        run: echo "TypeScript CI passed"
      - name: Failed
        if: needs.test.result == 'failure' || needs.test.result == 'cancelled'
        run: exit 1
