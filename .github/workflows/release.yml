name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g., 0.11.0)"
        required: true
      prerelease:
        description: "Mark as prerelease"
        type: boolean
        default: false

jobs:
  bump-and-validate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PAT }}

      - name: Validate running from main
        run: |
          if [ "$GITHUB_REF" != "refs/heads/main" ]; then
            echo "Releases must run from the main branch"
            exit 1
          fi

      - name: Validate version format
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+'; then
            echo "Invalid version format"
            exit 1
          fi

      - name: Bump all package versions
        env:
          VERSION: ${{ inputs.version }}
        run: |
          set -e
          echo "Bumping all packages to $VERSION..."

          # TypeScript — update version and @anip-dev/* deps in package.json
          for pkg in packages/typescript/*/package.json; do
            if [[ "$pkg" == *node_modules* ]]; then continue; fi
            node -e "
              const fs = require('fs');
              const p = JSON.parse(fs.readFileSync('$pkg', 'utf8'));
              p.version = process.env.VERSION;
              for (const field of ['dependencies', 'devDependencies']) {
                if (!p[field]) continue;
                for (const [k, v] of Object.entries(p[field])) {
                  if (k.startsWith('@anip-dev/')) p[field][k] = process.env.VERSION;
                }
              }
              fs.writeFileSync('$pkg', JSON.stringify(p, null, 2) + '\n');
            "
          done
          echo "OK: TypeScript versions bumped"

          # Python — update version in pyproject.toml
          for pkg in packages/python/*/pyproject.toml contract-tests/pyproject.toml conformance/pyproject.toml; do
            [ -f "$pkg" ] || continue
            # Bump the package version
            sed -i "s/^version = \".*\"/version = \"$VERSION\"/" "$pkg"
            # Bump internal anip-* dependency pins (==OLD → ==NEW)
            sed -i "s/anip-\([a-z\-]*\)==[0-9][0-9.]*/anip-\1==$VERSION/g" "$pkg"
          done
          echo "OK: Python versions bumped"

          # Java — update pom.xml versions
          # Parent POM version
          sed -i "s|<version>[0-9]\+\.[0-9]\+\.[0-9]\+</version>|<version>$VERSION</version>|g" packages/java/pom.xml
          # Child POMs inherit from parent, but also update anip.version property
          sed -i "s|<anip.version>[0-9]\+\.[0-9]\+\.[0-9]\+</anip.version>|<anip.version>$VERSION</anip.version>|" packages/java/pom.xml
          # Child parent version references
          for pom in packages/java/*/pom.xml; do
            sed -i "s|<version>[0-9]\+\.[0-9]\+\.[0-9]\+</version>|<version>$VERSION</version>|g" "$pom"
          done
          echo "OK: Java versions bumped"

          # TypeScript example app
          for pkg in examples/anip-ts/package.json; do
            node -e "
              const fs = require('fs');
              const p = JSON.parse(fs.readFileSync('$pkg', 'utf8'));
              for (const field of ['dependencies', 'devDependencies']) {
                if (!p[field]) continue;
                for (const [k, v] of Object.entries(p[field])) {
                  if (k.startsWith('@anip-dev/')) p[field][k] = process.env.VERSION;
                }
              }
              fs.writeFileSync('$pkg', JSON.stringify(p, null, 2) + '\n');
            "
          done
          echo "OK: Example app deps bumped"

      - name: Commit version bump
        env:
          VERSION: ${{ inputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Versions already at $VERSION — no bump needed"
          else
            git commit -m "chore: bump all package versions to $VERSION"
            git push
            echo "Version bump committed and pushed"
          fi

      - name: Validate required CI checks passed
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          # Check against the commit BEFORE the bump (the one CI ran on)
          SHA=$(git rev-parse HEAD~1 2>/dev/null || git rev-parse HEAD)
          REQUIRED_CHECKS=("python-ci" "typescript-ci" "go-ci" "java-ci" "csharp-ci")
          ERRORS=0
          for CHECK in "${REQUIRED_CHECKS[@]}"; do
            STATUS=$(gh api "repos/$GH_REPO/commits/$SHA/check-runs" \
              --jq ".check_runs[] | select(.name == \"$CHECK\") | .conclusion" \
              | head -1)
            if [ "$STATUS" = "success" ]; then
              echo "OK: $CHECK = success"
            else
              echo "FAIL: $CHECK status is '${STATUS:-not found}' (expected 'success')"
              ERRORS=$((ERRORS + 1))
            fi
          done
          if [ "$ERRORS" -gt 0 ]; then exit 1; fi

      - name: Validate tags do not exist
        env:
          VERSION: ${{ inputs.version }}
        run: |
          TAG="v$VERSION"
          GO_TAG="packages/go/v$VERSION"
          JAVA_TAG="packages/java/v$VERSION"
          CSHARP_TAG="packages/csharp/v$VERSION"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "FAIL: Tag '$TAG' already exists"
            exit 1
          fi
          echo "OK: Tag '$TAG' is available"
          if git rev-parse "$GO_TAG" >/dev/null 2>&1; then
            echo "FAIL: Go module tag '$GO_TAG' already exists"
            exit 1
          fi
          echo "OK: Go module tag '$GO_TAG' is available"
          if git rev-parse "$JAVA_TAG" >/dev/null 2>&1; then
            echo "FAIL: Java tag '$JAVA_TAG' already exists"
            exit 1
          fi
          echo "OK: Java tag '$JAVA_TAG' is available"
          if git rev-parse "$CSHARP_TAG" >/dev/null 2>&1; then
            echo "FAIL: C# tag '$CSHARP_TAG' already exists"
            exit 1
          fi
          echo "OK: C# tag '$CSHARP_TAG' is available"

      - name: Validate TypeScript package versions and internal deps
        working-directory: packages/typescript
        env:
          VERSION: ${{ inputs.version }}
        run: |
          FAILED=0
          for pkg in core crypto server service hono express fastify mcp mcp-hono mcp-express mcp-fastify rest graphql stdio; do
            PKG_VERSION=$(node -p "require('./$pkg/package.json').version")
            if [ "$PKG_VERSION" != "$VERSION" ]; then
              echo "FAIL: $pkg version is $PKG_VERSION, expected $VERSION"
              FAILED=1
            fi
            # Check all @anip-dev/* deps match the release version
            for dep_field in dependencies devDependencies; do
              STALE=$(node -p "
                const deps = require('./$pkg/package.json')['$dep_field'] || {};
                Object.entries(deps)
                  .filter(([k,v]) => k.startsWith('@anip-dev/') && v !== process.env.VERSION)
                  .map(([k,v]) => k + '=' + v)
                  .join(',')
              ")
              if [ -n "$STALE" ]; then
                echo "FAIL: $pkg $dep_field has stale @anip deps: $STALE"
                FAILED=1
              fi
            done
          done
          if [ "$FAILED" -eq 1 ]; then exit 1; fi
          echo "All 13 TypeScript packages and internal deps at version $VERSION"

      - name: Validate Python package versions and internal deps
        env:
          VERSION: ${{ inputs.version }}
        run: |
          FAILED=0
          for pkg in anip-core anip-crypto anip-server anip-service anip-fastapi anip-mcp anip-rest anip-graphql anip-studio anip-stdio anip-grpc; do
            PKG_VERSION=$(grep '^version' packages/python/$pkg/pyproject.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
            if [ "$PKG_VERSION" != "$VERSION" ]; then
              echo "FAIL: $pkg version is $PKG_VERSION, expected $VERSION"
              FAILED=1
            fi
            # Check internal anip-* deps use exact lockstep pin (==VERSION)
            # Catch both wrong versions AND wrong operators (>= instead of ==)
            INTERNAL_DEPS=$(grep -E '"anip-(core|crypto|server|service|fastapi)==' packages/python/$pkg/pyproject.toml || true)
            if [ -n "$INTERNAL_DEPS" ]; then
              # Every internal dep line must contain ==VERSION
              BAD=$(echo "$INTERNAL_DEPS" | grep -v "==$VERSION" || true)
              if [ -n "$BAD" ]; then
                echo "FAIL: $pkg has non-lockstep internal deps:"
                echo "$BAD"
                FAILED=1
              fi
            fi
          done
          if [ "$FAILED" -eq 1 ]; then exit 1; fi
          echo "All 9 Python packages and internal deps at version $VERSION"

      - name: Validate Go module exists
        run: |
          if [ ! -f packages/go/go.mod ]; then
            echo "FAIL: packages/go/go.mod not found"
            exit 1
          fi
          echo "OK: Go module found at packages/go/go.mod"

      - name: Validate Java package versions
        working-directory: packages/java
        env:
          VERSION: ${{ inputs.version }}
        run: |
          FAILED=0
          for pom in anip-core anip-crypto anip-server anip-service anip-spring-boot anip-quarkus anip-rest anip-rest-spring anip-rest-quarkus anip-graphql anip-graphql-spring anip-graphql-quarkus anip-mcp anip-mcp-spring anip-mcp-quarkus anip-stdio anip-example-flights anip-example-flights-quarkus; do
            if [ ! -f "$pom/pom.xml" ]; then
              echo "FAIL: $pom/pom.xml not found"
              FAILED=1
              continue
            fi
            # Check parent version in child pom
            PARENT_VERSION=$(grep -A5 '<parent>' "$pom/pom.xml" | grep '<version>' | sed 's/.*<version>\(.*\)<\/version>.*/\1/')
            if [ "$PARENT_VERSION" != "$VERSION" ]; then
              echo "FAIL: $pom parent version is $PARENT_VERSION, expected $VERSION"
              FAILED=1
            fi
          done
          # Check parent POM version
          POM_VERSION=$(grep '^    <version>' pom.xml | head -1 | sed 's/.*<version>\(.*\)<\/version>.*/\1/')
          if [ "$POM_VERSION" != "$VERSION" ]; then
            echo "FAIL: parent POM version is $POM_VERSION, expected $VERSION"
            FAILED=1
          fi
          # Check anip.version property (drives internal dependency versions via dependencyManagement)
          ANIP_PROP=$(grep '<anip.version>' pom.xml | sed 's/.*<anip.version>\(.*\)<\/anip.version>.*/\1/')
          if [ "$ANIP_PROP" != "$VERSION" ]; then
            echo "FAIL: anip.version property is $ANIP_PROP, expected $VERSION"
            FAILED=1
          fi
          if [ "$FAILED" -eq 1 ]; then exit 1; fi
          echo "All 17 Java modules and anip.version property at version $VERSION"

  publish-typescript:
    needs: bump-and-validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install and build
        working-directory: packages/typescript
        run: |
          npm ci
          npm run build --workspaces

      - name: Dry run — verify packages
        working-directory: packages/typescript
        run: |
          for pkg in core crypto server service hono express fastify mcp mcp-hono mcp-express mcp-fastify rest graphql stdio; do
            echo "=== Checking $pkg ==="
            cd $pkg && npm pack --dry-run && cd ..
          done

      - name: Publish in topological order
        working-directory: packages/typescript
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -e
          publish_or_skip() {
            local pkg=$1
            cd $pkg
            OUTPUT=$(npm publish --access public 2>&1) && {
              echo "OK: $pkg published"
              cd ..
              return 0
            }
            # npm publish failed — check if it's "already exists"
            if echo "$OUTPUT" | grep -qi "cannot publish over the previously published"; then
              echo "SKIP: $pkg@$(node -p 'require("./package.json").version') already published"
              cd ..
              return 0
            fi
            echo "FAIL: $pkg publish failed:"
            echo "$OUTPUT"
            cd ..
            return 1
          }

          # Layer 1: no deps
          publish_or_skip core

          # Layer 2: depends on core
          publish_or_skip crypto

          # Layer 3: depends on core, crypto
          publish_or_skip server

          # Layer 4: depends on core, crypto, server
          publish_or_skip service

          # Layer 5: depends on service
          publish_or_skip hono
          publish_or_skip express
          publish_or_skip fastify

          # Layer 6: depends on service
          publish_or_skip mcp

          # Layer 7: depends on mcp + framework
          publish_or_skip mcp-hono
          publish_or_skip mcp-express
          publish_or_skip mcp-fastify

          # Layer 8: depends on service
          publish_or_skip rest
          publish_or_skip graphql
          publish_or_skip stdio

  publish-python:
    needs: bump-and-validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build twine

      - name: Build and check all packages
        run: |
          for pkg in anip-core anip-crypto anip-server anip-service anip-fastapi anip-mcp anip-rest anip-graphql anip-studio anip-stdio anip-grpc; do
            echo "=== Building $pkg ==="
            cd packages/python/$pkg
            rm -rf dist/
            python -m build
            twine check dist/*
            cd ../../..
          done

      - name: Publish in dependency order
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: |
          set -e
          publish_or_skip() {
            local pkg=$1
            cd packages/python/$pkg
            OUTPUT=$(twine upload dist/* 2>&1) && {
              echo "OK: $pkg published"
              cd ../../..
              return 0
            }
            # twine upload failed — check if it's "already exists"
            if echo "$OUTPUT" | grep -qi "File already exists"; then
              echo "SKIP: $pkg already published on PyPI"
              cd ../../..
              return 0
            fi
            echo "FAIL: $pkg publish failed:"
            echo "$OUTPUT"
            cd ../../..
            return 1
          }

          publish_or_skip anip-core
          publish_or_skip anip-crypto
          publish_or_skip anip-server
          publish_or_skip anip-service
          publish_or_skip anip-fastapi
          publish_or_skip anip-mcp
          publish_or_skip anip-rest
          publish_or_skip anip-graphql
          publish_or_skip anip-studio
          publish_or_skip anip-stdio
          publish_or_skip anip-grpc

  publish-java:
    needs: bump-and-validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          server-id: central
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD

      - name: Build and verify
        working-directory: packages/java
        run: mvn verify

      - name: Import GPG key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
        run: |
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import

      - name: Deploy to Maven Central
        working-directory: packages/java
        env:
          MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
        run: |
          set -e
          for mod in anip-core anip-crypto anip-server anip-service anip-spring-boot anip-quarkus anip-rest anip-rest-spring anip-rest-quarkus anip-graphql anip-graphql-spring anip-graphql-quarkus anip-mcp anip-mcp-spring anip-mcp-quarkus anip-stdio; do
            echo "=== Deploying $mod ==="
            OUTPUT=$(mvn deploy -pl $mod -am -DskipTests -Prelease 2>&1) && {
              echo "OK: $mod deployed"
              continue
            }
            if echo "$OUTPUT" | grep -qi "already exists"; then
              echo "SKIP: $mod already published"
              continue
            fi
            echo "FAIL: $mod deploy failed:"
            echo "$OUTPUT"
            exit 1
          done

  publish-csharp:
    needs: bump-and-validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Pack all NuGet packages
        working-directory: packages/csharp
        env:
          VERSION: ${{ inputs.version }}
        run: |
          set -e
          PACKAGES=(Anip.Core Anip.Crypto Anip.Server Anip.Service Anip.AspNetCore Anip.Rest Anip.Rest.AspNetCore Anip.GraphQL Anip.GraphQL.AspNetCore Anip.Mcp Anip.Mcp.AspNetCore Anip.Stdio)
          for pkg in "${PACKAGES[@]}"; do
            echo "=== Packing $pkg ==="
            dotnet pack "src/$pkg/$pkg.csproj" -c Release -o nupkgs /p:Version="$VERSION"
          done
          echo "Packed $(ls nupkgs/*.nupkg | wc -l) packages"

      - name: Publish to NuGet
        working-directory: packages/csharp
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          set -e
          for nupkg in nupkgs/*.nupkg; do
            echo "=== Publishing $(basename $nupkg) ==="
            OUTPUT=$(dotnet nuget push "$nupkg" --api-key "$NUGET_API_KEY" --source https://api.nuget.org/v3/index.json --skip-duplicate 2>&1) && {
              echo "OK: $(basename $nupkg) published"
              continue
            }
            if echo "$OUTPUT" | grep -qi "already exists"; then
              echo "SKIP: $(basename $nupkg) already published"
              continue
            fi
            echo "FAIL: $(basename $nupkg) publish failed:"
            echo "$OUTPUT"
            exit 1
          done

  publish-studio-docker:
    needs: bump-and-validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Studio image
        env:
          VERSION: ${{ inputs.version }}
        run: |
          docker build -t anipprotocol/studio:"$VERSION" -t anipprotocol/studio:latest studio/
          docker push anipprotocol/studio:"$VERSION"
          docker push anipprotocol/studio:latest

  release:
    needs: [publish-typescript, publish-python, publish-java, publish-csharp, publish-studio-docker]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create tag
        env:
          VERSION: ${{ inputs.version }}
        run: |
          git tag "v$VERSION"
          git push origin "v$VERSION"

      - name: Create Go module tag
        env:
          VERSION: ${{ inputs.version }}
        run: |
          GO_TAG="packages/go/v$VERSION"
          git tag "$GO_TAG"
          git push origin "$GO_TAG"

      - name: Create Java tag
        env:
          VERSION: ${{ inputs.version }}
        run: |
          JAVA_TAG="packages/java/v$VERSION"
          git tag "$JAVA_TAG"
          git push origin "$JAVA_TAG"

      - name: Create C# tag
        env:
          VERSION: ${{ inputs.version }}
        run: |
          CSHARP_TAG="packages/csharp/v$VERSION"
          git tag "$CSHARP_TAG"
          git push origin "$CSHARP_TAG"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ inputs.version }}"
          generate_release_notes: true
          prerelease: ${{ inputs.prerelease }}
