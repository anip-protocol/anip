name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (must match all package versions, e.g. 0.3.1)"
        required: true
        type: string
      prerelease:
        description: "Mark as prerelease"
        required: false
        type: boolean
        default: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate ref is main
        run: |
          CURRENT_BRANCH=$(git rev-parse --abbrev-ref HEAD)
          if [ "$CURRENT_BRANCH" != "main" ]; then
            echo "::error::Release must run from main, got '$CURRENT_BRANCH'"
            exit 1
          fi

      - name: Validate version against all 10 packages
        env:
          EXPECTED: ${{ inputs.version }}
        run: |
          ERRORS=0

          echo "Expected version: $EXPECTED"
          echo ""

          # Python packages
          for pkg in anip-core anip-crypto anip-server anip-service anip-fastapi; do
            ACTUAL=$(python3 -c "
          import tomllib
          with open('packages/python/$pkg/pyproject.toml', 'rb') as f:
              print(tomllib.load(f)['project']['version'])
          ")
            if [ "$ACTUAL" != "$EXPECTED" ]; then
              echo "::error::$pkg version is '$ACTUAL', expected '$EXPECTED'"
              ERRORS=$((ERRORS + 1))
            else
              echo "✓ $pkg = $ACTUAL"
            fi
          done

          # TypeScript packages
          for pkg in core crypto server service hono; do
            ACTUAL=$(node -e "console.log(JSON.parse(require('fs').readFileSync('packages/typescript/$pkg/package.json','utf8')).version)")
            if [ "$ACTUAL" != "$EXPECTED" ]; then
              echo "::error::@anip/$pkg version is '$ACTUAL', expected '$EXPECTED'"
              ERRORS=$((ERRORS + 1))
            else
              echo "✓ @anip/$pkg = $ACTUAL"
            fi
          done

          if [ $ERRORS -gt 0 ]; then
            echo ""
            echo "::error::$ERRORS package(s) have mismatched versions"
            exit 1
          fi

          echo ""
          echo "All 10 packages at version $EXPECTED"

      - name: Validate CI checks passed on this commit
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          SHA=$(git rev-parse HEAD)
          echo "Validating CI checks for commit $SHA"

          REQUIRED_CHECKS=("test (3.11)" "test (3.12)" "test (20)" "test (22)")
          ERRORS=0

          for CHECK in "${REQUIRED_CHECKS[@]}"; do
            STATUS=$(gh api "repos/$GH_REPO/commits/$SHA/check-runs" \
              --jq ".check_runs[] | select(.name == \"$CHECK\") | .conclusion" \
              | head -1)
            if [ "$STATUS" = "success" ]; then
              echo "✓ $CHECK = success"
            else
              echo "::error::$CHECK status is '${STATUS:-not found}' (expected 'success')"
              ERRORS=$((ERRORS + 1))
            fi
          done

          if [ $ERRORS -gt 0 ]; then
            echo ""
            echo "::error::$ERRORS CI check(s) have not passed on this commit"
            exit 1
          fi

      - name: Validate tag does not exist
        env:
          VERSION: ${{ inputs.version }}
        run: |
          TAG="v$VERSION"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "::error::Tag '$TAG' already exists"
            exit 1
          fi
          echo "Tag '$TAG' is available"

      - name: Create tag
        env:
          VERSION: ${{ inputs.version }}
        run: |
          TAG="v$VERSION"
          git tag "$TAG"
          git push origin "$TAG"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
          IS_PRERELEASE: ${{ inputs.prerelease }}
        run: |
          TAG="v$VERSION"
          FLAGS=""
          if [ "$IS_PRERELEASE" = "true" ]; then
            FLAGS="--prerelease"
          fi
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            $FLAGS
