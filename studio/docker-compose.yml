version: '3.8'
services:
  studio-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: anip_studio
      POSTGRES_USER: anip
      POSTGRES_PASSWORD: anip
    ports:
      - "5432:5432"
    volumes:
      - studio-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U anip -d anip_studio"]
      interval: 2s
      timeout: 5s
      retries: 10

  studio-api:
    build:
      context: ..
      dockerfile: studio/server/Dockerfile
    environment:
      DATABASE_URL: postgresql://anip:anip@studio-db:5432/anip_studio
    ports:
      - "8100:8100"
    depends_on:
      studio-db:
        condition: service_healthy

  studio-web:
    build:
      context: .
      dockerfile: Dockerfile.standalone
    ports:
      - "8080:8080"
    depends_on:
      - studio-api

volumes:
  studio-pgdata:
