services:
  anip-server:
    build:
      context: ../../examples/anip
    ports:
      - "9100:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/anip/manifest')"]
      interval: 3s
      timeout: 5s
      retries: 10

  rest-adapter:
    build:
      context: .
    ports:
      - "3001:3001"
    environment:
      ANIP_SERVICE_URL: "http://anip-server:8000"
      ANIP_ADAPTER_PORT: "3001"
      ANIP_ISSUER: "human:test@example.com"
      ANIP_SCOPE: "travel.search,travel.book:max_$500"
    depends_on:
      anip-server:
        condition: service_healthy
