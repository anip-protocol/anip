# ANIP-MCP Bridge Configuration
#
# Copy to bridge.yaml and adjust for your setup.

# The ANIP service to bridge
anip_service_url: "http://localhost:8000"

# Delegation token configuration
# The bridge creates tokens on behalf of this identity
delegation:
  issuer: "human:user@example.com"
  scope:
    - "travel.search"
    - "travel.book:max_$500"
  token_ttl_minutes: 60

# Surface ANIP metadata (side-effects, costs, prerequisites)
# in MCP tool descriptions
enrich_descriptions: true

# MCP transport: "stdio" (default)
transport: "stdio"
