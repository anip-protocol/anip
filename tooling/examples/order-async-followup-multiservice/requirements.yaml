system:
  name: order-followup-estate
  domain: commerce
  deployment_intent: multi_service_agent_execution

services:
  - name: order-service
    role: execution
    public_http: true
  - name: fulfillment-service
    role: followup
    public_http: true

transports:
  http: true
  stdio: false
  grpc: false

trust:
  mode: signed
  checkpoints: false

auth:
  delegation_tokens: true
  purpose_binding: true
  scoped_authority: true
  service_to_service_handoffs: true

permissions:
  preflight_discovery: true
  restricted_vs_denied: true

audit:
  durable: true
  searchable: true
  cross_service_reconstruction_required: true

lineage:
  invocation_id: true
  client_reference_id: true
  task_id: true
  parent_invocation_id: true
  cross_service_continuity_required: true

business_constraints:
  delayed_cross_service_followups_should_still_be_legible: true
  async_steps_should_not_require_hidden_parent_link_rules: true

scale:
  shape_preference: multi_service_estate
  high_availability: false
