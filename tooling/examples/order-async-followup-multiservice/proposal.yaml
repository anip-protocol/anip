proposal:
  recommended_shape: multi_service_estate

  rationale:
    - the downstream action happens later on a different service
    - continuity survives, but interpretation of delayed follow-up still needs explicit pressure

  required_components:
    - manifest_generator_per_service
    - token_verifier_per_service
    - invocation_executor_per_service
    - durable_audit_store_per_service
    - lineage_recorder_per_service
    - bounded_async_followup_guidance

  declared_surfaces:
    budget_enforcement: false
    binding_requirements: false
    authority_posture: false
    recovery_class: false
    refresh_via: false
    verify_via: false
    followup_via: true
    cross_service_handoff: true
    cross_service_continuity: true
    cross_service_reconstruction: false

  anti_pattern_warnings:
    - do_not_drop_lineage_on_delayed_followups
    - do_not_require_hidden_scheduler_specific_linkage_rules

  expected_glue_reduction:
    orchestration:
      - delayed_followup_parent_link_glue
    observability:
      - async_cross_service_reconstruction_guesswork
