system:
  name: travel-booking-estate-followup
  domain: travel
  deployment_intent: multi_service_agent_execution

services:
  - name: travel-search
    role: planning
    public_http: true
  - name: travel-booking
    role: execution
    public_http: true
  - name: travel-status
    role: verification
    public_http: true

transports:
  http: true
  stdio: false
  grpc: false

trust:
  mode: signed
  checkpoints: false

auth:
  delegation_tokens: true
  purpose_binding: true
  scoped_authority: true
  service_to_service_handoffs: true

permissions:
  preflight_discovery: true
  restricted_vs_denied: true
  grantable_requirements: true

audit:
  durable: true
  searchable: true
  cross_service_reconstruction_required: true

lineage:
  invocation_id: true
  client_reference_id: true
  task_id: true
  parent_invocation_id: true
  cross_service_continuity_required: true

risk_profile:
  service_a:
    search_flights:
      side_effect: none
  service_b:
    book_flight:
      side_effect: irreversible
      cost_visibility_required: true
      recovery_guidance_required: true
  service_c:
    get_booking_status:
      side_effect: none

business_constraints:
  cross_service_follow_up_paths_should_be_discoverable: true
  booking_result_should_be_verifiable_without_wrapper_side_maps: true
  action_chain_must_remain_reconstructable: true

scale:
  shape_preference: multi_service_estate
  high_availability: false
