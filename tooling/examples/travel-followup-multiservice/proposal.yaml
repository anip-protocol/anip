proposal:
  recommended_shape: multi_service_estate

  rationale:
    - planning, booking, and verification are split across service boundaries
    - each service needs its own audit integrity
    - cross-service follow-up discovery is the main new problem

  service_shapes:
    travel-search:
      shape: production_single_service
    travel-booking:
      shape: production_single_service
    travel-status:
      shape: production_single_service

  shared_requirements:
    - task_id propagation across services
    - parent_invocation_id propagation across service hops
    - durable audit in all services
    - searchable audit in all services
    - discoverable follow-up and verification relationships

  required_components:
    - manifest_generator_per_service
    - token_verifier_per_service
    - permission_evaluator_per_service
    - invocation_executor_per_service
    - failure_mapper_per_service
    - durable_audit_store_per_service
    - lineage_recorder_per_service
    - handoff_propagation_rules

  optional_components:
    - central_aggregated_lineage_index
    - shared_search_layer_for_operator_views
    - approval_service

  key_runtime_requirements:
    - search results should be linkable to booking actions
    - booking actions should have a discoverable verification path
    - task identity should survive across planning, execution, and verification
    - each service should remain independently auditable

  anti_pattern_warnings:
    - do_not_hide_cross_service_next_steps_only_in_wrapper_code
    - do_not_push_follow_up_relationships_only_into_docs
    - do_not_make_verification_depend_on_out_of_band_operator_knowledge

  expected_glue_reduction:
    orchestration:
      - cross_service_next_step_wrapper_logic
      - post_booking_verification_mapping
    observability:
      - workflow_reconstruction_across_three_services
      - operator_side_follow_up_guesswork
