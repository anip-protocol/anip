proposal:
  recommended_shape: production_single_service

  rationale:
    - one service boundary is enough
    - the primary risk is stale local assumptions about service state
    - recovery should emphasize revalidation instead of manual debugging

  required_components:
    - capability_registry
    - manifest_generator
    - token_verifier
    - delegation_engine
    - permission_evaluator
    - invocation_executor
    - failure_mapper
    - durable_audit_store
    - lineage_recorder
    - http_adapter

  optional_components:
    - token_issuer
    - embedded_studio

  key_runtime_requirements:
    - expose state-revalidation failures clearly
    - point callers toward manifest refresh or equivalent revalidation
    - preserve task and invocation lineage through correction loops

  declared_surfaces:
    budget_enforcement: false
    binding_requirements: false
    authority_posture: false
    recovery_class: true
    refresh_via: true
    verify_via: false
    followup_via: false
    cross_service_handoff: false
    cross_service_continuity: false
    cross_service_reconstruction: false

  anti_pattern_warnings:
    - do_not_hide_manifest_drift_only_in_transport_errors
    - do_not_force_manual_cache_invalidation_guesswork

  expected_glue_reduction:
    orchestration:
      - manifest_refresh_wrapper_logic
      - stale_assumption_recovery_glue
    observability:
      - debug_only_revalidation_paths
