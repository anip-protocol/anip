scenario:
  name: stale_manifest_requires_revalidation_before_retry
  category: orchestration
  narrative: >
    An agent attempts an operation using a cached understanding of the service
    manifest or capability shape. The service state has changed. The interface
    should make clear that the right move is to revalidate state before retrying,
    rather than blindly retrying or escalating.
  context:
    capability: sync_partner_account
    stale_local_artifact: cached_manifest
    side_effect: transactional
    token_scope:
      - partners:sync
    task_id: partner-sync-2026-04
    client_reference_id: step-2-sync
    parent_invocation_id: inv-manifest-drift-001
  expected_behavior:
    - do_not_retry_blindly
    - explain_that_revalidation_is_required
    - make_the_revalidation_path_clear
    - preserve_lineage_across_retry_after_revalidation
    - produce_audit_entries_for_failed_and_retried_steps
  expected_anip_support:
    - structured_failure
    - recovery_class
    - revalidation_guidance
    - task_id_support
    - parent_invocation_id_support
    - audit_queryability
