proposal:
  recommended_shape: production_single_service

  rationale:
    - quote search and booking can remain in one service
    - durable audit and lineage remain required
    - the main problem is refresh-path discoverability, not service partitioning

  required_components:
    - capability_registry
    - manifest_generator
    - token_verifier
    - delegation_engine
    - permission_evaluator
    - invocation_executor
    - failure_mapper
    - durable_audit_store
    - lineage_recorder
    - http_adapter

  optional_components:
    - token_issuer
    - embedded_studio

  key_runtime_requirements:
    - expose stale-binding failures with explicit recovery posture
    - expose which capability typically refreshes stale quote state
    - preserve task and parent invocation lineage through refresh loops

  declared_surfaces:
    budget_enforcement: false
    binding_requirements: true
    authority_posture: false
    recovery_class: true
    refresh_via: true
    verify_via: false
    followup_via: false
    cross_service_handoff: false
    cross_service_continuity: false
    cross_service_reconstruction: false

  anti_pattern_warnings:
    - do_not_hide_quote_refresh_only_in_docs
    - do_not_make_agents_guess_which_capability_refreshes_a_quote
    - do_not_push_recovery_sequencing_only_into_prompt_logic

  expected_glue_reduction:
    orchestration:
      - quote_refresh_wrapper_logic
      - stale_binding_prompt_rules
    safety:
      - stale_quote_booking_guard_glue
    observability:
      - retry_chain_reconstruction
