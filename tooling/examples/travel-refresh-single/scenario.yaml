scenario:
  name: book_flight_with_stale_quote_needs_refresh_path
  category: orchestration
  narrative: >
    An agent attempts to book a flight using a quote obtained earlier in the
    task. The quote is now stale. The system should not just say "refresh
    required" — it should make the refresh path itself discoverable so the
    agent knows that searching flights again is the typical next step.
  context:
    stale_capability: book_flight
    refresh_capability: search_flights
    stale_binding_field: quote_id
    side_effect: irreversible
    token_scope:
      - flights:search
      - flights:book
    task_id: trip-planning-refresh-01
    client_reference_id: step-5-book
    parent_invocation_id: inv-stale-quote-001
  expected_behavior:
    - do_not_execute_with_stale_quote
    - explain_that_refresh_is_required
    - make_the_refresh_path_discoverable
    - preserve_task_identity_across_refresh
    - preserve_parent_invocation_lineage
    - produce_audit_entries_for_failed_and_refreshed_steps
  expected_anip_support:
    - structured_failure
    - recovery_class
    - binding_freshness_visibility
    - refresh_path_guidance
    - task_id_support
    - parent_invocation_id_support
    - audit_queryability
