system:
  name: travel-booking-service-refresh
  domain: travel
  deployment_intent: public_http_service

transports:
  http: true
  stdio: false
  grpc: false

trust:
  mode: signed
  checkpoints: false

auth:
  delegation_tokens: true
  purpose_binding: true
  scoped_authority: true

permissions:
  preflight_discovery: true
  restricted_vs_denied: true

audit:
  durable: true
  searchable: true

lineage:
  invocation_id: true
  client_reference_id: true
  task_id: true
  parent_invocation_id: true

risk_profile:
  capabilities:
    search_flights:
      side_effect: none
    book_flight:
      side_effect: irreversible
      cost_visibility_required: true
      recovery_guidance_required: true

business_constraints:
  stale_quotes_must_not_be_booked: true
  refresh_path_should_be_discoverable: true
  blocked_booking_should_preserve_lineage: true

scale:
  shape_preference: production_single_service
  high_availability: false
