scenario:
  name: stale_quote_requires_cross_service_refresh_before_booking
  category: orchestration
  narrative: >
    A booking service rejects an upstream quote because it is stale. The agent
    now needs to know which upstream service and capability should be invoked to
    refresh the artifact before retrying, without relying on wrapper-side maps.
  context:
    planning_service_capability: search_flights
    execution_service_capability: book_flight
    failure_type: binding_stale
    task_id: trip-refresh-2026-04
    parent_search_invocation_id: inv-refresh-001
    token_scope_service_a:
      - flights:search
    token_scope_service_b:
      - flights:book
  expected_behavior:
    - booking_service_preserves_cross_service_lineage
    - refresh_source_is_discoverable_without_bespoke_glue
    - operator_can_link_the_failed_booking_back_to_the_search_step
  expected_anip_support:
    - task_id_support
    - parent_invocation_id_support
    - structured_failure
    - audit_queryability
    - cross_service_refresh_guidance

