system:
  name: travel-refresh-handoff-estate
  domain: travel
  deployment_intent: multi_service_agent_execution

services:
  - name: travel-search
    role: planning
    public_http: true
  - name: travel-booking
    role: execution
    public_http: true

transports:
  http: true
  stdio: false
  grpc: false

trust:
  mode: signed
  checkpoints: false

auth:
  delegation_tokens: true
  purpose_binding: true
  scoped_authority: true
  service_to_service_handoffs: true

permissions:
  preflight_discovery: true
  restricted_vs_denied: true

audit:
  durable: true
  searchable: true
  cross_service_reconstruction_required: true

lineage:
  invocation_id: true
  client_reference_id: true
  task_id: true
  parent_invocation_id: true
  cross_service_continuity_required: true

risk_profile:
  planning_service:
    search_flights:
      side_effect: none
  execution_service:
    book_flight:
      side_effect: irreversible
      recovery_guidance_required: true

business_constraints:
  stale_cross_service_artifacts_should_not_force_manual_wrapper_logic: true
  refresh_source_should_be_discoverable_across_service_boundary: true
  upstream_artifacts_may_expire_before_downstream_use: true

scale:
  shape_preference: multi_service_estate
  high_availability: false
