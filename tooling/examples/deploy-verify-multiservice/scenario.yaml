scenario:
  name: deploy_on_one_service_verify_on_another
  category: orchestration
  narrative: >
    An agent deploys a service through one ANIP surface and must verify rollout
    health through a separate monitoring service. The interface should expose
    enough relationship clarity that the post-deploy verification path does not
    depend on wrapper-side service maps.
  context:
    execution_service_capability: deploy_service
    verification_service_capability: get_deployment_status
    side_effect_execution: transactional
    task_id: deploy-cross-service-2026-04
    parent_deploy_invocation_id: inv-deploy-xsvc-001
    token_scope_service_a:
      - deploy:write
    token_scope_service_b:
      - deploy:read
  expected_behavior:
    - deployment_service_preserves_lineage
    - verification_service_link_is_discoverable
    - operator_can_reconstruct_deploy_then_verify_chain
  expected_anip_support:
    - task_id_support
    - parent_invocation_id_support
    - audit_queryability
    - cross_service_verification_guidance

