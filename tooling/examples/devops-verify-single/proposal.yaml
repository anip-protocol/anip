proposal:
  recommended_shape: production_single_service

  rationale:
    - deploy and status-check can live in one control surface
    - the main gap is post-action verification guidance
    - durable audit and lineage remain required

  required_components:
    - capability_registry
    - manifest_generator
    - token_verifier
    - delegation_engine
    - permission_evaluator
    - invocation_executor
    - failure_mapper
    - durable_audit_store
    - lineage_recorder
    - http_adapter

  optional_components:
    - token_issuer
    - embedded_studio

  key_runtime_requirements:
    - expose a likely verification capability after deployment
    - preserve lineage across write and verification steps
    - keep verification guidance advisory rather than mandatory workflow

  anti_pattern_warnings:
    - do_not_hide_verification_paths_only_in_runbooks
    - do_not_force_agents_to_guess_the_post_deploy_check

  expected_glue_reduction:
    orchestration:
      - post_deploy_verification_wrapper_logic
      - runbook_only_follow_up_guidance
    observability:
      - manual_write_then_check_reconstruction
