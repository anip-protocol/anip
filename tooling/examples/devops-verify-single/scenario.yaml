scenario:
  name: deploy_service_then_verify_status_path
  category: orchestration
  narrative: >
    An agent deploys a service successfully. The next sensible move is usually
    to verify rollout status using a separate read capability. The interface
    should make that relationship visible so the agent does not rely on docs,
    prompt instructions, or wrapper-side maps to know how to verify success.
  context:
    write_capability: deploy_service
    verification_capability: get_deployment_status
    side_effect: transactional
    token_scope:
      - deploy:write
      - deploy:read
    task_id: deploy-verify-2026-04
    client_reference_id: step-9-verify
    parent_invocation_id: inv-deploy-verify-001
  expected_behavior:
    - execute_deploy_with_lineage
    - make_the_verification_path_discoverable
    - preserve_lineage_between_write_and_verify
    - produce_useful_audit_entries_for_both_steps
  expected_anip_support:
    - task_id_support
    - parent_invocation_id_support
    - audit_queryability
    - follow_up_guidance
    - verification_path_guidance
