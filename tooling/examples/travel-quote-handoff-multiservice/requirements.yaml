system:
  name: travel-quote-handoff-estate
  domain: travel
  deployment_intent: multi_service_agent_execution

services:
  - name: travel-search
    role: planning
    public_http: true
  - name: travel-booking
    role: execution
    public_http: true

transports:
  http: true
  stdio: false
  grpc: false

trust:
  mode: signed
  checkpoints: false

auth:
  delegation_tokens: true
  purpose_binding: true
  scoped_authority: true
  service_to_service_handoffs: true

permissions:
  preflight_discovery: true
  restricted_vs_denied: true

audit:
  durable: true
  searchable: true
  cross_service_reconstruction_required: true

lineage:
  invocation_id: true
  client_reference_id: true
  task_id: true
  parent_invocation_id: true
  cross_service_continuity_required: true

risk_profile:
  planning_service:
    search_flights:
      side_effect: none
  execution_service:
    book_flight:
      side_effect: irreversible
      recovery_guidance_required: true

business_constraints:
  quote_handoff_should_not_depend_on_wrapper_only_contracts: true
  downstream_service_should_not_need_ui_only_context_to_use_upstream_output: true
  cross_service_booking_chain_must_be_reconstructable: true
  upstream_quote_should_be_machine_usable_by_downstream_service: true

scale:
  shape_preference: multi_service_estate
  high_availability: false
