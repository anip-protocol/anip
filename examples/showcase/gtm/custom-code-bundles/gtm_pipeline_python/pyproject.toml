[project]
name = "gtm-pipeline-q2-review"
version = "0.1.0"
description = "GTM Pipeline Q2 Review generated from Registry with custom implementation overlay"
requires-python = ">=3.12"
dependencies = [
    "anip-core==0.23.0",
    "anip-service==0.23.0",
    "anip-fastapi==0.23.0",
    "anyio>=4.0.0",
    "fastapi>=0.115.0",
    "httpx>=0.27.0",
    "mcp>=1.2.0",
    "uvicorn>=0.30.0",
    "psycopg[binary]>=3.2.0",
]

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-asyncio>=0.23", "httpx>=0.27.0"]

[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
include = ["gtm_pipeline_q2_review*", "shared*"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
