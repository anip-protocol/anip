[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "anip-grpc"
version = "0.24.12"
description = "ANIP gRPC transport binding"
requires-python = ">=3.11"
dependencies = [
    "anip-service==0.24.12",
    "grpcio>=1.81.1",
    "protobuf>=6.33.5",
]

[tool.hatch.build.targets.wheel]
packages = ["src/anip_grpc"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
