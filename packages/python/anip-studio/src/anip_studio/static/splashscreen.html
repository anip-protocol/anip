<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ANIP Studio</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          "Avenir Next",
          "Segoe UI",
          sans-serif;
        background: #f6efe1;
        color: #142235;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        overflow: hidden;
        background:
          radial-gradient(circle at 18% 12%, rgba(43, 91, 116, 0.16), transparent 34%),
          linear-gradient(135deg, #fbf4e6 0%, #ece2d1 100%);
      }

      .shell {
        width: 100%;
        height: 100vh;
        display: grid;
        place-items: center;
        padding: 28px;
      }

      .card {
        width: 100%;
        display: grid;
        gap: 18px;
        justify-items: center;
        text-align: center;
      }

      .mark {
        width: 64px;
        height: 64px;
        border-radius: 18px;
        display: grid;
        place-items: center;
        background: #142235;
        color: #f8efe0;
        font-size: 34px;
        font-weight: 800;
        line-height: 1;
        box-shadow: 0 16px 36px rgba(20, 34, 53, 0.24);
      }

      h1 {
        margin: 0;
        font-size: 24px;
        letter-spacing: -0.02em;
      }

      p {
        max-width: 320px;
        margin: 0;
        color: #536171;
        font-size: 14px;
        line-height: 1.5;
      }

      .loader {
        width: 168px;
        height: 5px;
        overflow: hidden;
        border-radius: 999px;
        background: rgba(20, 34, 53, 0.12);
      }

      .loader::before {
        content: "";
        display: block;
        width: 42%;
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, #2b5b74, #f29d38);
        animation: slide 1.2s ease-in-out infinite;
      }

      @keyframes slide {
        0% {
          transform: translateX(-110%);
        }
        100% {
          transform: translateX(260%);
        }
      }
    </style>
  </head>
  <body>
    <main class="shell" aria-label="ANIP Studio is starting">
      <section class="card">
        <div class="mark" aria-hidden="true">A</div>
        <h1>Starting ANIP Studio</h1>
        <p>Preparing the local workspace and embedded Studio API.</p>
        <div class="loader" aria-hidden="true"></div>
      </section>
    </main>
  </body>
</html>
