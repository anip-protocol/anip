[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "anip-studio"
version = "0.11.2"
description = "ANIP Studio — embedded inspection UI for ANIP services"
requires-python = ">=3.11"
dependencies = [
    "anip-service==0.11.2",
    "fastapi",
]

[tool.hatch.build.targets.wheel]
packages = ["src/anip_studio"]
